name: CI/CD - Dev

on:
  push:
    branches: [dev]

jobs:
  pipeline:
    uses: ./.github/workflows/pipeline.yaml
    # OIDC needs id-token: write on the calling job so the reusable workflow
    # can assume the AWS role.
    permissions:
      id-token: write
      contents: read
    with:
      aws_env: dev
      aws_account: "150100906110"
      aws_region: us-east-2
      app_name: app
      project_name: container-arch
